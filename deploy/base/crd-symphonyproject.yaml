apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: symphonyprojects.kocao.withakay.github.com
spec:
  group: kocao.withakay.github.com
  names:
    kind: SymphonyProject
    plural: symphonyprojects
    singular: symphonyproject
    shortNames:
      - symproj
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - source
                - repositories
                - runtime
              properties:
                paused:
                  type: boolean
                source:
                  type: object
                  required:
                    - project
                    - tokenSecretRef
                  properties:
                    project:
                      type: object
                      required:
                        - owner
                        - number
                      properties:
                        owner:
                          type: string
                          minLength: 1
                        number:
                          type: integer
                          format: int64
                          minimum: 1
                    tokenSecretRef:
                      type: object
                      required:
                        - name
                      properties:
                        name:
                          type: string
                          minLength: 1
                        key:
                          type: string
                    activeStates:
                      type: array
                      items:
                        type: string
                    terminalStates:
                      type: array
                      items:
                        type: string
                    fieldName:
                      type: string
                    pollIntervalSeconds:
                      type: integer
                      format: int32
                      minimum: 1
                repositories:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required:
                      - owner
                      - name
                    properties:
                      owner:
                        type: string
                        minLength: 1
                      name:
                        type: string
                        minLength: 1
                      repoURL:
                        type: string
                      branch:
                        type: string
                      gitAuth:
                        type: object
                        properties:
                          secretName:
                            type: string
                            minLength: 1
                          tokenKey:
                            type: string
                          usernameKey:
                            type: string
                      agentAuth:
                        type: object
                        properties:
                          apiKeySecretName:
                            type: string
                          oauthSecretName:
                            type: string
                      egressMode:
                        type: string
                runtime:
                  type: object
                  required:
                    - image
                  properties:
                    image:
                      type: string
                      minLength: 1
                    command:
                      type: array
                      items:
                        type: string
                    args:
                      type: array
                      items:
                        type: string
                    workingDir:
                      type: string
                    env:
                      type: array
                      items:
                        type: object
                        required:
                          - name
                        properties:
                          name:
                            type: string
                            minLength: 1
                          value:
                            type: string
                    maxConcurrentItems:
                      type: integer
                      format: int32
                      minimum: 1
                    retryBaseDelaySeconds:
                      type: integer
                      format: int32
                      minimum: 1
                    retryMaxDelaySeconds:
                      type: integer
                      format: int32
                      minimum: 1
                    ttlSecondsAfterFinished:
                      type: integer
                      format: int32
                      minimum: 0
                    recentSkipLimit:
                      type: integer
                      format: int32
                      minimum: 1
                    recentErrorLimit:
                      type: integer
                      format: int32
                      minimum: 1
                    activeStatusItemLimit:
                      type: integer
                      format: int32
                      minimum: 1
                    defaultRepoRevision:
                      type: string
                    defaultEgressMode:
                      type: string
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                  format: int64
                phase:
                  type: string
                  enum:
                    - Pending
                    - Ready
                    - Paused
                    - Error
                conditions:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                resolvedFieldName:
                  type: string
                lastSyncTime:
                  type: string
                  format: date-time
                lastSuccessfulSyncTime:
                  type: string
                  format: date-time
                nextSyncTime:
                  type: string
                  format: date-time
                activeClaims:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                retryQueue:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                recentSkips:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                unsupportedRepositories:
                  type: array
                  items:
                    type: string
                lastError:
                  type: string
                eligibleItems:
                  type: integer
                  format: int32
                runningItems:
                  type: integer
                  format: int32
                retryingItems:
                  type: integer
                  format: int32
                completedItems:
                  type: integer
                  format: int32
                failedItems:
                  type: integer
                  format: int32
                skippedItems:
                  type: integer
                  format: int32
