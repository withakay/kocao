apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: harnessruns.kocao.withakay.github.com
spec:
  group: kocao.withakay.github.com
  names:
    kind: HarnessRun
    plural: harnessruns
    singular: harnessrun
    shortNames:
      - hrun
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - repoURL
                - image
              properties:
                workspaceSessionName:
                  type: string
                repoURL:
                  type: string
                  minLength: 1
                repoRevision:
                  type: string
                image:
                  type: string
                  minLength: 1
                command:
                  type: array
                  items:
                    type: string
                args:
                  type: array
                  items:
                    type: string
                workingDir:
                  type: string
                env:
                  type: array
                  items:
                    type: object
                    required:
                      - name
                    properties:
                      name:
                        type: string
                        minLength: 1
                      value:
                        type: string
                gitAuth:
                  type: object
                  properties:
                    secretName:
                      type: string
                      minLength: 1
                    tokenKey:
                      type: string
                    usernameKey:
                      type: string
                agentAuth:
                  type: object
                  description: >-
                    Configures credential injection for agent CLIs.
                    Both fields are optional.
                  properties:
                    apiKeySecretName:
                      type: string
                      description: >-
                        Name of a Secret whose data keys are injected as
                        environment variables (e.g. ANTHROPIC_API_KEY).
                    oauthSecretName:
                      type: string
                      description: >-
                        Name of a Secret whose data keys are projected as
                        auth files at paths expected by each CLI.
                agentSession:
                  type: object
                  description: >-
                    Optional sandbox-backed coding-agent session configuration.
                  properties:
                    runtime:
                      type: string
                      description: Agent runtime (e.g. "sandbox-agent").
                    agent:
                      type: string
                      description: Agent to launch (e.g. "codex", "claude", "opencode", "pi").
                imagePullSecrets:
                  type: array
                  description: >-
                    Secret names to attach to the run Pod for private registry auth.
                  items:
                    type: string
                egressMode:
                  type: string
                ttlSecondsAfterFinished:
                  type: integer
                  format: int32
                  minimum: 0
                imageProfile:
                  type: object
                  description: >-
                    Harness image profile selection intent.
                  properties:
                    profile:
                      type: string
                      description: >-
                        Explicit profile name (e.g. "base", "go", "web", "full").
                    selectionPolicy:
                      type: string
                      description: >-
                        Profile selection policy (e.g. "auto", "preferred-minimal", "compatibility").
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                  format: int64
                phase:
                  type: string
                  enum:
                    - Pending
                    - Starting
                    - Running
                    - Succeeded
                    - Failed
                podName:
                  type: string
                startTime:
                  type: string
                  format: date-time
                completionTime:
                  type: string
                  format: date-time
                agentSession:
                  type: object
                  description: Agent session status.
                  properties:
                    runtime:
                      type: string
                    agent:
                      type: string
                    sessionId:
                      type: string
                    phase:
                      type: string
                conditions:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                imageProfile:
                  type: object
                  description: Harness image profile selection status.
                  properties:
                    requestedProfile:
                      type: string
                    selectionPolicy:
                      type: string
                    selectedProfile:
                      type: string
                    selectionSource:
                      type: string
                    fallbackProfile:
                      type: string
                    reason:
                      type: string
